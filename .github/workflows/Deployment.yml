name: CI / CD
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.test
        run: echo "${{ secrets.ENV_TEST }}" > .env.test

      - name: Build the App
        run: npm run build

      - name: Install isolate sandbox
        run: |
          sudo apt-get install -y build-essential libcap-dev libsystemd-dev
          git clone --depth 1 https://github.com/ioi/isolate.git /tmp/isolate
          cd /tmp/isolate
          make isolate
          sudo make install
          sudo chmod 4755 /usr/local/bin/isolate
          sudo mkdir -p /var/local/lib/isolate
          sudo chown root:root /var/local/lib/isolate
          sudo chmod 755 /var/local/lib/isolate

      - name: Run unit tests
        run: npm test -- --coverage

      - name: Start test services and database migration
        run: npm run pretest:e2e

      - name: Seed database
        run: npm run db:seed:test

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Cleanup test services
        if: always()
        run: npm run docker:test:down

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            bash /home/ubuntu/scripts/deploy.sh